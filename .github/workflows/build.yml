name: build-index

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: bun install

      - name: Validate registry
        run: bun run validate

  build:
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install deps
        run: bun install

      - name: Build index
        run: bun run build

      - name: Commit plugins.json
        run: |
          if git diff --quiet -- plugins.json; then
            echo "No changes to plugins.json"
            exit 0
          fi
          git add plugins.json
          git -c user.name="github-actions" -c user.email="github-actions@users.noreply.github.com" commit -m "chore: update plugins.json"
          git push
